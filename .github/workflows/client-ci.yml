name: Client CI — Build & Test

on:
  push:
    branches: ["**"]
    paths: ["client/**"]
  pull_request:
    branches: ["**"]
    paths: ["client/**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: pnpm -w -F "@geoserver-viewer/client" run build --if-present

      - name: Test client
        run: pnpm -w -F "@geoserver-viewer/client" run test --if-present
